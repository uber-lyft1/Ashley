<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <title>Ash</title>
         <link rel="icon" href="icon.jpeg" type="image/x-icon">
         <script>
            // Wait for the window to load so the button exists
window.onload = function() {
    const btn = document.querySelector('.no');

    btn.addEventListener('mouseover', function() {
        // Calculate random positions within the visible screen
        // We subtract a margin so it doesn't go off-edge
        const newTop = Math.floor(Math.random() * (window.innerHeight - btn.offsetHeight));
        const newLeft = Math.floor(Math.random() * (window.innerWidth - btn.offsetWidth));

        btn.style.position = "fixed"; // Switch to fixed only once hovered
        btn.style.top = newTop + "px";
        btn.style.left = newLeft + "px";
    });
};



         </script>
    </head>
    <body>
        <div class="scroll-container">
            <div class="scroll-content">
                <img class="scroll" src="Banner.png" alt="banner">
                <img class="scroll" src="Text.png" alt="text">
